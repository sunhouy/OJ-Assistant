name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve release tag and flags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "Release tag cannot be empty." >&2
            exit 1
          fi

          PRERELEASE=false
          if [[ "${TAG}" == *"-"* ]]; then
            PRERELEASE=true
          fi

          echo "release_tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=OJAssistant ${TAG}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.target.name }})
    needs: prepare
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: windows-latest
            name: windows
            artifact_name: windows-artifacts
          - os: ubuntu-latest
            name: linux
            artifact_name: linux-artifacts
          - os: macos-13
            name: macos
            artifact_name: macos-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build and package artifacts
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_release.py --version "${{ needs.prepare.outputs.release_tag }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release files
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f | sort

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
